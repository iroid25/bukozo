# Nginx reverse proxy for the Bukonz Next.js app (Docker container on
# 127.0.0.1:3002). Install to /etc/nginx/sites-available/bukonze.conf and
# symlink into sites-enabled:
#
#   sudo cp deploy/nginx/bukonze.conf /etc/nginx/sites-available/bukonze.conf
#   sudo ln -s /etc/nginx/sites-available/bukonze.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then issue a certificate with certbot (run once the HTTP server block
# below is live so the ACME http-01 challenge can resolve):
#
#   sudo certbot --nginx -d example.com -d www.example.com
#
# Replace every occurrence of example.com with your real domain.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

# Rate limit login / auth-sensitive endpoints
limit_req_zone $binary_remote_addr zone=bukonze_login:10m rate=10r/m;

upstream bukonze_app {
    server 127.0.0.1:3002;
    keepalive 64;
}

# ── HTTP: ACME challenge + redirect everything else to HTTPS ──────────────
server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ───────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com www.example.com;

    # Populated by certbot --nginx; paths shown are certbot's defaults.
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 25m;

    # ── Security headers ──────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    # ── Next.js static assets: hashed filenames, safe to cache forever ─
    location /_next/static/ {
        proxy_pass http://bukonze_app;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /static/ {
        proxy_pass http://bukonze_app;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Slightly tighter rate limit on auth routes
    location /api/auth/ {
        limit_req zone=bukonze_login burst=20 nodelay;
        proxy_pass http://bukonze_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Everything else, incl. WebSocket upgrade support for Next.js
    #    dev-tooling / any future socket-based routes ───────────────────
    location / {
        proxy_pass http://bukonze_app;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    location = /api/health {
        proxy_pass http://bukonze_app;
        proxy_set_header Host $host;
        access_log off;
    }
}
